<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="2020.0000mm" height="1600.0000mm"
     viewBox="0 0 202.000000 160.000000">
  <!--
    Build plate : 150.00 x 150.00 mm
    Coordinate  : 1 SVG unit = 1 mm
    Display zoom: 10x  (width/height = viewBox x 10)
    Hatch stroke: 0.04 mm = ~28 mm on screen at this zoom
    Legend panel: right margin (42 mm wide)
  -->
  <defs>
    <marker id="endArrow" markerWidth="2" markerHeight="1.4"
            refX="0" refY="0.7" orient="auto"
            markerUnits="strokeWidth">
      <polyline fill="darkblue" points="0,0 2,0.7 0,1.4 0.2,0.7"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="202.000000" height="160.000000" fill="#f0f0f0" stroke="none"/>
  <!-- Build plate boundary (150 x 150 mm) -->
  <rect x="5.000000" y="5.000000" width="150.000000" height="150.000000"
        fill="#ffffff" stroke="#aaaaaa" stroke-width="0.2" stroke-dasharray="1,0.5"/>
  <!-- Build plate centre circle (r = 75.00 mm) -->
  <circle cx="80.000000" cy="80.000000" r="75.000000"
          fill="none" stroke="#bbbbbb" stroke-width="0.15" stroke-dasharray="0.8,0.4"/>
  <!-- Centre cross-hair -->
  <line x1="5.000000" y1="80.000000" x2="155.000000" y2="80.000000" stroke="#cccccc" stroke-width="0.1"/>
  <line x1="80.000000" y1="5.000000" x2="80.000000" y2="155.000000" stroke="#cccccc" stroke-width="0.1"/>
  <circle cx="80.000000" cy="80.000000" r="0.3" fill="#cccccc" stroke="none"/>
  <!-- Corner labels -->
  <text x="5.400000" y="4.600000" font-family="sans-serif" font-size="2" fill="#888888">0,0</text>
  <text x="154.600006" y="4.600000" font-family="sans-serif" font-size="2" fill="#888888" text-anchor="end">150,0</text>
  <text x="5.400000" y="157.199997" font-family="sans-serif" font-size="2" fill="#888888">0,150</text>
  <!-- Layer geometry -->
  <g id="geometry">
    <line x1="51.01682" y1="114.61420" x2="50.93822" y2="114.63091" stroke="green" stroke-width="0.04000"/>
    <line x1="50.96311" y1="114.52339" x2="50.88816" y2="114.53932" stroke="green" stroke-width="0.04000"/>
    <line x1="50.91811" y1="114.43073" x2="50.88315" y2="114.43815" stroke="green" stroke-width="0.04000"/>
    <path d="M 50.9877 114.574 L 51.019 114.617 L 51.0047 114.703 L 51.0047 114.703 L 50.9473 114.64 L 50.8904 114.586 L 50.8788 114.35 L 50.9877 114.574" fill="none" stroke="blue" stroke-width="0.04000" fill-rule="evenodd" fill-opacity="1.000"/>
  </g>
</svg>
